id: MasterAniket/gitagpt-dataset
title: "GitaGPT Dataset — Bhagavad Gita Oracle Training Corpus"
subtitle: "Structured multilingual dataset for fine-tuning AI oracles grounded in the Bhagavad Gita (Sanskrit/English/Hindi)"
description: |
  A comprehensive, production-ready dataset for building AI systems grounded in the Bhagavad Gita's 700 shlokas.
  
  Built for GitaGPT by MasterAniket — an AI life guidance oracle that maps modern problems to authentic Gita verses and responds in Krishna's voice.
  
  **What's inside:**
  - 18 chapters with Sanskrit names, English/Hindi summaries, themes, and modern mappings
  - 17 key shlokas fully annotated (targeting 108) with Sanskrit, transliteration, EN/HI translations, word meanings, purport, and modern question mappings
  - 20 Q&A training pairs: real modern questions → Krishna-voiced responses with actual shlokas
  - Fine-tuning ready JSONL in both Alpaca/Instruction format and ChatML format
  - 30 problem-to-verse mappings for RAG retrieval
  - 20-term Sanskrit philosophical glossary with modern equivalents
  - Complete documentation: Training guide, schema reference, data sources, ethical guidelines

  **Languages:** Sanskrit (Devanagari) · English · Hindi
  **Formats:** CSV · JSON · JSONL
  **Use Cases:** Fine-tuning, RAG, Semantic Search, Chatbots, Education

